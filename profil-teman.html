<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->

    <a href="index.html" class="logo-link" aria-label="Kembali ke Beranda">
      <img src="assets/logo.png" alt="Logo" class="logo-img" />
    </a>

    <nav class="nav-links" id="navLinks">
      <div class="nav-links-logo">
        <img src="assets/logoh.png" alt="Logo" />
        <p class="nav-account-status" id="navAccountStatus">Belum masuk</p>
      </div>
      <a href="index.html">Beranda</a>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">
          Konten
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="nav-dropdown-menu">
          <a href="index.html#gallery">Galeri</a>
          <a href="index.html#timeline">Timeline</a>
          <a href="index.html#video">Video</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn active">
          Komunitas
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="nav-dropdown-menu">
          <a href="profil-teman.html">Member</a>
          <a href="pesan-kesan.html">Pesan &amp; Saran</a>
        </div>
      </div>

      <a href="tentang.html">Tentang</a>
    </nav>

    <div class="navbar-actions">
      <button class="btn-login" id="btnMasuk" type="button" title="Klik untuk masuk">
        <span class="btn-login-avatar" id="btnLoginAvatar" aria-hidden="true">
          <svg class="icon-guest" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span class="btn-login-initial" id="btnLoginInitial"></span>
          <span class="btn-login-dot" id="btnLoginDot"></span>
        </span>
        <span class="btn-login-label" id="btnMasukText">Masuk</span>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
        <svg class="icon-burger" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="nav-backdrop" id="navBackdrop"></div>
  </header>

  <!-- ============ PAGE HEADER ============ -->
  <div class="page-header">
    <h1>Member</h1>
    <p>Wajah dari warga-warga d.bruuh</p>
  </div>

  <div class="page-cta">
    <button class="btn-primary" id="btnTambahMember" type="button" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Tambah Member
    </button>
  </div>

  <!-- ============ PROFILE GRID (dimuat dari database) ============ -->
  <div class="profile-grid" id="memberGrid"></div>

  <!-- ============ MODAL: TAMBAH/EDIT MEMBER (khusus admin) ============ -->
  <div class="modal" id="modalMember" style="display:none;">
    <div class="modal-content">
      <span class="close-btn" id="btnTutupMember">&times;</span>
      <h2 id="modalMemberTitle">Tambah Member</h2>
      <form id="form-member">
        <div class="form-group">
          <label for="input-member-avatar">Foto Profil</label>
          <input type="file" id="input-member-avatar" accept="image/*" />
        </div>
        <div class="form-group">
          <label for="input-member-nama">Nama</label>
          <input type="text" id="input-member-nama" placeholder="Contoh: Iyan" maxlength="60" required />
        </div>
        <div class="form-group">
          <label for="input-member-username">Username</label>
          <input type="text" id="input-member-username" placeholder="Contoh: @febry4nz" maxlength="60" />
        </div>
        <div class="form-group">
          <label for="input-member-quote">Quote</label>
          <input type="text" id="input-member-quote" placeholder="Kutipan singkat" maxlength="150" />
        </div>
        <button type="submit" id="btnSimpanMember">Simpan Member</button>
        <p class="auth-msg" id="memberMsg"></p>
      </form>
    </div>
  </div>

  <!-- ============ MODAL: MASUK / DAFTAR ============ -->
  <div class="modal" id="modalAuth" style="display:none;">
    <div class="modal-content">
      <span class="close-btn" id="btnTutupAuth">&times;</span>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Masuk</button>
        <button type="button" class="auth-tab" data-tab="daftar">Daftar</button>
      </div>

      <form id="form-login" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required />
        </div>
        <button type="submit" id="btnKirimLogin">Masuk</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <form id="form-daftar" class="auth-form" style="display:none;">
        <div class="form-group">
          <label for="daftar-nama">Nama</label>
          <input type="text" id="daftar-nama" required />
        </div>
        <div class="form-group">
          <label for="daftar-email">Email</label>
          <input type="email" id="daftar-email" required />
        </div>
        <div class="form-group">
          <label for="daftar-password">Password (min. 6 karakter)</label>
          <input type="password" id="daftar-password" minlength="6" required />
        </div>
        <button type="submit" id="btnKirimDaftar">Daftar</button>
        <p class="auth-msg" id="daftarMsg"></p>
      </form>
    </div>
  </div>


  <footer class="footer">
    <p>Dibuat oleh iyn & r4ps</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
