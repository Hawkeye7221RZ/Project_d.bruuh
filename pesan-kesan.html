      <div class="nav-dropdown">

          Konten
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>

        <div class="nav-dropdown-menu">

    <div class="navbar-actions">
      <button class="btn-login" id="btnMasuk">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span id="btnMasukText">Masuk</span>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
        <svg class="icon-burger" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

  </header>

  <!-- ============ PAGE HEADER ============ -->
  <div class="page-header">
    <h1>Pesan &amp; Kesan</h1>
    <p>Kata-kata terakhir sebelum kita semua sibuk dengan jalan masing-masing.</p>
  </div>

  <div class="page-cta">
    <button class="btn-primary" id="btnTulisPesan">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Tulis Pesan
    </button>
  </div>

  <!-- ============ MESSAGE LIST ============ -->
  <div class="message-list">
  </div>

  <!-- ============ MODAL: TULIS PESAN ============ -->
  <div class="modal" id="modalPesan" style="display:none;">
    <div class="modal-content">
      <span class="close-btn" id="btnTutup">&times;</span>
      <h2>Tulis Pesan & Kesan</h2>
      <p class="posting-as">Menulis sebagai: <strong id="pesanNamaDisplay">-</strong></p>
      <form id="form-pesan">
        <div class="form-group">
          <label for="input-pesan">Pesan</label>
          <textarea id="input-pesan" rows="4" placeholder="Tulis pesan & kesanmu di sini..." required></textarea>
        </div>
        <button type="submit" id="btnKirim">Kirim</button>
      </form>
    </div>
  </div>

  <!-- ============ MODAL: MASUK / DAFTAR ============ -->
  <div class="modal" id="modalAuth" style="display:none;">
    <div class="modal-content">
      <span class="close-btn" id="btnTutupAuth">&times;</span>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Masuk</button>
        <button type="button" class="auth-tab" data-tab="daftar">Daftar</button>
      </div>

      <form id="form-login" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required />
        </div>
        <button type="submit" id="btnKirim">Masuk</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <form id="form-daftar" class="auth-form" style="display:none;">
        <div class="form-group">
          <label for="daftar-nama">Nama</label>
          <input type="text" id="daftar-nama" required />
        </div>
        <div class="form-group">
          <label for="daftar-email">Email</label>
          <input type="email" id="daftar-email" required />
        </div>
        <div class="form-group">
          <label for="daftar-password">Password (min. 6 karakter)</label>
          <input type="password" id="daftar-password" minlength="6" required />
        </div>
        <button type="submit" id="btnKirim">Daftar</button>
        <p class="auth-msg" id="daftarMsg"></p>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>Dibuat dengan kenangan oleh angkatan 2025</p>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
